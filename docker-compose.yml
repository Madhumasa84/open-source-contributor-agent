services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: osca
      POSTGRES_USER: osca
      POSTGRES_PASSWORD: osca
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osca -d osca"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://osca:osca@postgres:5432/osca
      REDIS_URL: redis://redis:6379/0
      OSCA_WORKSPACE_ROOT: /workspace
      ALLOWED_ORIGINS: http://localhost:3010
    ports:
      - "8010:8000"
    volumes:
      - ./workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8010
    ports:
      - "3010:3000"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  ollama-data:
